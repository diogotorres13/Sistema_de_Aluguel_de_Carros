<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locadora de Veículos | PUC Minas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #10b981;
            --dark: #1e293b;
            --light: #f8fafc;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #e2e8f0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .dashboard {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .logo-area i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        h1 {
            color: var(--dark);
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 1rem;
            text-decoration: none;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.2s ease;
            font-size: 1rem;
        }

        /* Botões de Cadastro */
        .btn-register {
            background-color: var(--light);
            color: var(--dark);
            border: 1px solid #cbd5e1;
        }

        .btn-register:hover {
            background-color: #f1f5f9;
            transform: translateY(-2px);
        }

        /* Botão de Operação Principal */
        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            transform: translateY(-2px);
        }

        /* Botão de Consulta */
        .btn-success {
            background-color: var(--secondary);
            color: white;
        }

        .btn-success:hover {
            background-color: #059669;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            transform: translateY(-2px);
        }

        .footer-info {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #f1f5f9;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="logo-area">
        <i class="fa-solid fa-car-side"></i>
        <h1>Locadora Central</h1>
        <p class="subtitle">Gestão de Aluguéis e Contratos </p>
    </div>

    <div class="menu-grid">
        <a href="/clientes-page" class="btn btn-register">
            <i class="fa-solid fa-user-plus"></i> Novo Cliente
        </a>
        <a href="/carros-page" class="btn btn-register">
            <i class="fa-solid fa-car"></i> Novo Automóvel
        </a>

        <div style="margin: 10px 0; border-bottom: 1px solid #eee;"></div>

        <a href="/pedidos-page" class="btn btn-primary">
            <i class="fa-solid fa-file-contract"></i> Solicitar Aluguel
        </a>
        
        <a href="/consulta-page" class="btn btn-success">
            <i class="fa-solid fa-magnifying-glass"></i> Consultar Status 
        </a>
    </div>

    <div class="footer-info">
        Engenharia de Software - PUC Minas <br>
        <strong>Laboratório 02 - Sistema de Aluguel de Carros</strong> 
    </div>
</div>

</body>
</html>
